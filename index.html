<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="calendar-header">
      <button id="prevBtn" class="btn-nav">← Prev</button>
      <h1 id="monthYear" class="month-year">April 2026</h1>
      <div class="header-right-buttons">
        <button id="nextBtn" class="btn-nav">Next →</button>
        <div class="buttons-column">
          <button id="todayBtn" class="btn-gradient">Today</button>
          <button id="addEventBtn" class="btn-gradient">+ Add Event</button>
        </div>
      </div>
    </header>

    <div class="calendar-grid" id="calendarGrid">
      <!-- Day headers and cells will be rendered here -->
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Add Event</h2>
        <button id="closeModalBtn" class="close-btn">×</button>
      </div>

      <form id="eventForm" class="event-form">
        <div class="form-group">
          <label for="eventTitle">Title <span class="required">*</span></label>
          <input type="text" id="eventTitle" name="title" placeholder="Event title" maxlength="100">
          <span id="titleError" class="error-msg"></span>
        </div>

        <div class="form-group">
          <label for="eventDate">Date <span class="required">*</span></label>
          <input type="date" id="eventDate" name="date" required>
          <span id="dateError" class="error-msg"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="eventStartTime">Start Time</label>
            <input type="time" id="eventStartTime" name="startTime">
            <span id="startTimeError" class="error-msg"></span>
          </div>
          <div class="form-group">
            <label for="eventEndTime">End Time</label>
            <input type="time" id="eventEndTime" name="endTime">
            <span id="endTimeError" class="error-msg"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="eventDescription">Description</label>
          <textarea id="eventDescription" name="description" placeholder="Optional description" rows="3"></textarea>
        </div>

        <input type="hidden" id="eventId" name="id">

        <div class="form-actions">
          <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save Event</button>
        </div>
      </form>

      <div id="deleteSection" class="delete-section hidden">
        <button id="deleteBtn" class="btn-danger">Delete Event</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
